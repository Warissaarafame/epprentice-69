<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>QR Code สั่งอาหารกลางวัน</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #ffffff;
      margin: 0;
      padding: 60px 20px;
    }
    h1 {
      font-size: 56px;
      margin-bottom: 10px;
    }
    p {
      font-size: 26px;
      margin: 5px 0;
      color: #333;
    }
    #qrcode {
      margin: 40px auto;
    }
    .hint {
      font-size: 24px;
      color: #006400;
      margin-top: 20px;
    }
    .footer {
      margin-top: 40px;
      font-size: 20px;
      color: #555;
    }
  </style>

  <!-- ✅ เรียกไลบรารี QR Code ให้ถูกต้อง -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body>

  <h1>📱 สแกนเพื่อสั่งอาหารกลางวัน</h1>
  <p>กรอกชื่อ • เลือกเมนู • ใส่จำนวน • บันทึก</p>

  <canvas id="qrcode"></canvas>

  <div class="hint">
    ✅ พนักงานตรวจสอบและแก้ไขข้อมูลของตนเองได้
  </div>

  <div class="footer">
    https://warissarafame.github.io/eprentice-69/order.html
  </div>

  <script>
    const orderUrl =
      "https://warissarafame.github.io/eprentice-69/order.html";

    QRCode.toCanvas(
      document.getElementById("qrcode"),
      orderUrl,
      {
        width: 450,
        margin: 2
      },
      function (error) {
        if (error) {
          console.error(error);
          alert("สร้าง QR ไม่สำเร็จ");
        }
      }
    );
  </script>

</body>
</html>
