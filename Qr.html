<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>QR Code สั่งอาหารกลางวัน</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #ffffff;
      margin: 0;
      padding: 40px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      font-size: 24px;
      margin-top: 0;
      color: #333;
    }

    #qrcode {
      margin: 30px auto;
    }

    .hint {
      font-size: 22px;
      margin-top: 20px;
      color: #006400;
    }

    .url {
      margin-top: 20px;
      font-size: 18px;
      color: #555;
    }
  </style>

  <!-- ไลบรารีสร้าง QR Code -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body>

  <h1>📱 สแกนเพื่อสั่งอาหารกลางวัน</h1>
  <p>เปิดด้วยมือถือ • กรอกชื่อ • เลือกเมนู • บันทึก</p>

  <canvas id="qrcode"></canvas>

  <div class="hint">✅ สั่ง / แก้ไขข้อมูลของตนเองได้</div>

  <div class="url">
    URL: http://10.189.248.30:5500/order.html
  </div>

  <script>
    const orderUrl = "http://10.189.248.30:5500/order.html";

    QRCode.toCanvas(
      document.getElementById("qrcode"),
      orderUrl,
      {
        width: 400,   // ขนาด QR ใหญ่ เห็นชัดบนจอ
        margin: 2
      },
      function (error) {
        if (error) console.error(error);
      }
    );
  </script>

</body>
</html>
